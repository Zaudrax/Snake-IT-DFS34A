<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu Snake</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <main class="game-page">
        <h1>Snake Game</h1>
        <div id="game-container" style="width: 700px; height: 700px;">
            <div id="snake"></div>
            <div id="game-over-overlay" class="hidden">
                <div id="game-over-card">
                    <h2>Game Over</h2>
                    <p id="game-over-score">Score : 0</p>
                    <button id="restart-btn" onclick="restartGame()">Play Again</button>
                </div>
            </div>
        </div>
        <div class="controls" aria-label="Game controls">
            <button onclick="saveDirection('left')">←</button>
            <button onclick="saveDirection('right')">→</button>
            <button onclick="saveDirection('up')">↑</button>
            <button onclick="saveDirection('down')">↓</button>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
